  <text x="72" y="88" fill="#1F2937" font-family="Verdana, sans-serif" font-size="30" font-weight="700">LLMGuard Architecture Overview</text>
  <text x="72" y="120" fill="#6B7280" font-family="Verdana, sans-serif" font-size="16">Online protection, offline evaluation, and security operations in one workflow.</text>

  <rect x="72" y="164" width="250" height="110" rx="18" fill="#FFF4D6" stroke="#D6B56E" stroke-width="2"/>
  <text x="98" y="204" fill="#7A4D00" font-family="Verdana, sans-serif" font-size="22" font-weight="700">Input Sources</text>
  <text x="98" y="234" fill="#7A4D00" font-family="Verdana, sans-serif" font-size="16">user_input</text>
  <text x="98" y="258" fill="#7A4D00" font-family="Verdana, sans-serif" font-size="16">retrieved_context</text>
  <text x="98" y="282" fill="#7A4D00" font-family="Verdana, sans-serif" font-size="16">model_output</text>

  <rect x="390" y="146" width="420" height="148" rx="20" fill="#E8F1FF" stroke="#7EA6E0" stroke-width="2"/>
  <text x="420" y="186" fill="#163A72" font-family="Verdana, sans-serif" font-size="24" font-weight="700">Gateway Scan Engine</text>
  <text x="420" y="220" fill="#163A72" font-family="Verdana, sans-serif" font-size="16">Rules + classifier + output filter</text>
  <text x="420" y="246" fill="#163A72" font-family="Verdana, sans-serif" font-size="16">policy binding by tenant / app / env / scenario</text>
  <text x="420" y="272" fill="#163A72" font-family="Verdana, sans-serif" font-size="16">decision: allow / review / block</text>

  <rect x="878" y="164" width="250" height="110" rx="18" fill="#EAF8EA" stroke="#8FBE8F" stroke-width="2"/>
  <text x="906" y="204" fill="#1E5D2B" font-family="Verdana, sans-serif" font-size="22" font-weight="700">Persistence</text>
  <text x="906" y="234" fill="#1E5D2B" font-family="Verdana, sans-serif" font-size="16">DetectionResult</text>
  <text x="906" y="258" fill="#1E5D2B" font-family="Verdana, sans-serif" font-size="16">AuditLog</text>
  <text x="906" y="282" fill="#1E5D2B" font-family="Verdana, sans-serif" font-size="16">AlertEvent</text>

  <rect x="72" y="366" width="280" height="134" rx="18" fill="#FDECEC" stroke="#D79191" stroke-width="2"/>
