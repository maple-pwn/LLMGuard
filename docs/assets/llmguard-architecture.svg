  <text x="98" y="438" fill="#8A2F2F" font-family="Verdana, sans-serif" font-size="16">attack / adversarial / benign</text>
  <text x="98" y="462" fill="#8A2F2F" font-family="Verdana, sans-serif" font-size="16">labels, confidence, scenarios</text>
  <text x="98" y="486" fill="#8A2F2F" font-family="Verdana, sans-serif" font-size="16">RAG indirect injection samples</text>

  <rect x="388" y="344" width="424" height="178" rx="20" fill="#F3EAFE" stroke="#B89AE3" stroke-width="2"/>
  <text x="420" y="384" fill="#5D2A92" font-family="Verdana, sans-serif" font-size="24" font-weight="700">Ops Analysis Layer</text>
  <text x="420" y="418" fill="#5D2A92" font-family="Verdana, sans-serif" font-size="16">batch evaluation</text>
  <text x="420" y="442" fill="#5D2A92" font-family="Verdana, sans-serif" font-size="16">threshold scan</text>
  <text x="420" y="466" fill="#5D2A92" font-family="Verdana, sans-serif" font-size="16">rule effectiveness analysis</text>
  <text x="420" y="490" fill="#5D2A92" font-family="Verdana, sans-serif" font-size="16">false positive / false negative attribution</text>

  <rect x="878" y="366" width="250" height="134" rx="18" fill="#E7F7F6" stroke="#7CBDB8" stroke-width="2"/>
  <text x="906" y="406" fill="#0E5F5B" font-family="Verdana, sans-serif" font-size="22" font-weight="700">Artifacts</text>
  <text x="906" y="438" fill="#0E5F5B" font-family="Verdana, sans-serif" font-size="16">reports</text>
  <text x="906" y="462" fill="#0E5F5B" font-family="Verdana, sans-serif" font-size="16">casebook</text>
  <text x="906" y="486" fill="#0E5F5B" font-family="Verdana, sans-serif" font-size="16">weekly report / postmortem</text>

  <rect x="72" y="584" width="1056" height="96" rx="18" fill="#F5F0FF" stroke="#C5B6EA" stroke-width="2"/>
